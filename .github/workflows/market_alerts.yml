name: Genera Notifiche Finanziarie

on:
  workflow_dispatch:

  schedule:
    - cron: '0 7 * * *'
    - cron: '30 13 * * *'
    - cron: '0 21 * * *'

jobs:
  generate-and-publish-notification:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Esegui script Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_notification.py

      - name: Commit e push sicuro
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global core.pager cat

          # sincronizza prima di tutto
          git pull origin main --rebase || true

          git add interact/push_notifications.html

          # evita commit inutili
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare"
            exit 0
          fi

          git commit -m "🔔 Market Alert: Aggiornamento automatico notifica [skip ci]"

          # push con retry semplice ma NON loop infinito
          for i in 1 2 3; do
            git push origin main && break

            echo "Push fallito, retry $i..."

            git pull origin main --rebase || true
          done
