name: Genera Notifiche Finanziarie

on:
  # Avvio manuale da GitHub
  workflow_dispatch:

  # Esecuzioni automatiche (UTC)
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC
    - cron: '30 13 * * *' # 13:30 UTC
    - cron: '0 21 * * *'  # 21:00 UTC

# Evita esecuzioni simultanee dello stesso workflow
concurrency:
  group: financial-notifications
  cancel-in-progress: true

jobs:
  generate-and-publish-notification:
    runs-on: ubuntu-latest

    # Evita workflow zombie infiniti
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Esegui lo script Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_notification.py

      - name: Configura Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git config --global core.pager cat

      - name: Aggiorna branch locale
        run: |
          git pull origin main --rebase

      - name: Commit e Push modifiche
        run: |
          # Aggiunge il file modificato
          git add interact/push_notifications.html

          # Esce se non ci sono modifiche reali
          git diff --cached --quiet && echo "Nessuna modifica rilevata." && exit 0

          # Commit
          git commit -m "🔔 Market Alert: Aggiornamento automatico notifica [skip ci]"

          # Push
          git push origin main
