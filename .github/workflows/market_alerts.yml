name: Genera Notifiche Finanziarie

on:
  # Possibilità di lanciare lo script manualmente tramite bottone su GitHub
  workflow_dispatch: 
  
  # Orari di esecuzione automatica (espressi in fuso orario UTC)
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC - Chiusura Asia / Pre-apertura Europa
    - cron: '30 13 * * *'  # 13:30 UTC - Dati USA / Pre-apertura Wall Street
    - cron: '0 21 * * *'   # 21:00 UTC - Chiusura Wall Street / After-hours

jobs:
  generate-and-publish-notification:
    runs-on: ubuntu-latest
    
    # Permessi fondamentali per permettere al bot di scrivere nel tuo repository
    permissions:
      contents: write

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Scarica solo l'ultimo commit per velocizzare l'azione

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Aggiornato per evitare avvisi di deprecazione

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install google-genai  # La nuova libreria ufficiale di Google

      - name: Esegui lo script Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_notification.py 

      - name: Committa e pusha le modifiche
        run: |
          # Configura l'identità del bot di GitHub
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Aggiunge il file nella cartella interact
          git add interact/push_notifications.html
          
          # Committa solo se ci sono effettive modifiche al file
          git commit -m "🔔 Market Alert: Aggiornamento automatico notifica [skip ci]" || echo "Nessuna modifica rilevata, salto il commit."
          
          # Ciclo anti-conflitto per il Push (max 5 tentativi)
          max_retries=5
          attempt=1
          until git push origin main; do
            if [ $attempt -ge $max_retries ]; then
              echo "❌ Errore critico: Impossibile pushare dopo $max_retries tentativi a causa di conflitti continui."
              exit 1
            fi
            echo "⚠️ Conflitto o lock rilevato (Tentativo $attempt/$max_retries). Riprovo tra 5 secondi..."
            sleep 5
            
            # Scarica le ultime modifiche degli altri script e applica la notifica in cima (rebase)
            git pull --rebase origin main
            
            attempt=$((attempt+1))
          done
